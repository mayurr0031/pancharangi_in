name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
      - name: Lint (auto-fix first)
        run: pnpm lint:fix || true

      - name: Lint (fail on warnings)
        run: pnpm lint -- --max-warnings=0

      - name: Run tests
        run: pnpm test -- --run
